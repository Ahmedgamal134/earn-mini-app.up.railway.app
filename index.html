<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- كود التحقق من HilltopAds -->
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة إعلان - بوت الربح</title>
    <style>
        /* كل الـ CSS القديم */
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 بوت الربح الذكي</h1>
        
        <div class="message">
            <h2>📺 شاهد الإعلان واكسب نقاط</h2>
            <p>انتظر 15 ثانية بعد مشاهدة الإعلان</p>
        </div>
        
        <div class="timer" id="timer">15</div>
        
        <!-- هنا هتحط كود HilltopAds بعد ما تجيبه -->
        
        <div class="message" id="status">
            شاهد الإعلان وانتظر...
        </div>
    </div>
    
    <script>
        let timeLeft = 15;
        const timerElement = document.getElementById('timer');
        const statusElement = document.getElementById('status');
        
        const timer = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                timerElement.style.display = 'none';
                statusElement.innerHTML = '✅ تمت المشاهدة! يمكنك العودة للبوت لاستلام نقاطك';
            }
        }, 1000);
    </script>
</body>
</html>
