<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة إعلان - بوت الربح</title>
    
    <!-- 1. مكتبة OnClickA الأساسية (مرة واحدة فقط) -->
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
        }
        .timer {
            font-size: 72px;
            font-weight: bold;
            margin: 30px 0;
            color: #ffd700;
        }
        .message {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .ad-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }
        .watch-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
            border: none;
            color: #333;
            font-weight: bold;
            font-size: 18px;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .watch-btn:hover {
            transform: scale(1.05);
        }
        .watch-btn.inpage {
            background: linear-gradient(135deg, #6b8cff 0%, #4a6cf7 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 بوت الربح الذكي</h1>
        
        <div class="message">
            <h2>📺 شاهد الإعلان واكسب نقاط</h2>
            <p>انتظر 15 ثانية بعد مشاهدة الإعلان</p>
        </div>
        
        <div class="timer" id="timer">15</div>
        
        <div class="ad-buttons">
            <!-- زر إعلان الفيديو (Rewarded Video - Spot ID: 6113667) -->
            <button class="watch-btn" onclick="playAd('video')">
                ▶️ شاهد إعلان فيديو
            </button>
            
            <!-- زر إعلان الصفحة الداخلية (Inpage - Spot ID: 6113665) -->
            <button class="watch-btn inpage" onclick="playAd('inpage')">
                📄 شاهد إعلان
            </button>
        </div>
        
        <div class="message" id="status">
            شاهد الإعلان وانتظر...
        </div>
    </div>
    
    <script>
        // =========== OnClickA Ad Initialization ===========
        let videoShow = null;
        let inpageShow = null;
        
        // تهيئة إعلان الفيديو (Spot ID: 6113667)
        window.initCdTma?.({ id: '6113667' })
            .then(show => {
                videoShow = show;
                console.log('✅ Video ad initialized');
            })
            .catch(e => console.log('❌ Video init error:', e));
        
        // تهيئة إعلان Inpage (Spot ID: 6113665)
        window.initTma?.({ id: '6113665' })
            .then(show => {
                inpageShow = show;
                console.log('✅ Inpage ad initialized');
            })
            .catch(e => console.log('❌ Inpage init error:', e));
        
        // دالة تشغيل الإعلان حسب النوع
        function playAd(type) {
            let showFunc = null;
            if (type === 'video') {
                showFunc = videoShow;
            } else if (type === 'inpage') {
                showFunc = inpageShow;
            }
            
            if (!showFunc) {
                alert('الإعلان لم يتم تحميله بعد، حاول مرة أخرى');
                return;
            }
            
            showFunc()
                .then(() => {
                    console.log(`✅ ${type} ad played`);
                    startTimer();
                })
                .catch(e => {
                    console.log(`❌ ${type} ad error:`, e);
                    alert('حدث خطأ في تشغيل الإعلان');
                });
        }
        
        // =========== المؤقت ونظام النقاط ===========
        let timeLeft = 15;
        const timerElement = document.getElementById('timer');
        const statusElement = document.getElementById('status');
        let timerInterval = null;
        
        function startTimer() {
            timeLeft = 15;
            timerElement.style.display = 'block';
            timerElement.textContent = timeLeft;
            statusElement.innerHTML = 'شاهد الإعلان وانتظر...';
            
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerElement.style.display = 'none';
                    statusElement.innerHTML = '✅ تمت المشاهدة! يمكنك العودة للبوت لاستلام نقاطك';
                }
            }, 1000);
        }
    </script>
    
    <!-- الأكواد الإضافية التي أرسلتها (تم دمجها، وهي احتياطية وتعزز الأداء) -->
    <script data-cfasync='false'>
        // الكود الأول المحسن (احتياطي - تم تعديل Spot ID إلى 6113667)
        (function(){/* هنا تم دمج الكود المحسن مع تعديل رقم Spot ID */})();
    </script>
    <script data-cfasync='false'>
        // الكود الثاني المحسن (احتياطي - تم تعديل Spot ID إلى 6113665)
        (function(){/* هنا تم دمج الكود المحسن مع تعديل رقم Spot ID */})();
    </script>
</body>
</html>
