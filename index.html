<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عجلة الحظ - بوت الربح الذكي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 16px;
        }
        
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .balance-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .balance-title {
            font-size: 16px;
            opacity: 0.8;
        }
        
        .balance-amount {
            font-size: 48px;
            font-weight: 700;
            color: #ffd700;
            margin-top: 5px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        
        .stat-item {
            text-align: center;
            flex: 1;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
        }
        
        /* العجلة مصممة باستخدام conic-gradient (بدون Canvas) */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
            /* 7 قطاعات ملونة */
            background: conic-gradient(
                #FF6B6B 0deg 51.43deg,   /* 0 نقاط */
                #4ECDC4 51.43deg 102.86deg, /* 5 نقاط */
                #45B7D1 102.86deg 154.29deg, /* 10 نقاط */
                #96CEB4 154.29deg 205.72deg, /* 15 نقاط */
                #FFE194 205.72deg 257.15deg, /* 25 نقاط */
                #B8A9C9 257.15deg 308.58deg, /* 50 نقاط */
                #FFD700 308.58deg 360deg      /* 80 نقاط */
            );
        }
        
        /* النصوص على العجلة */
        .sector-texts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .sector-text {
            position: absolute;
            width: 60px;
            text-align: center;
            font-weight: bold;
            color: #000;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
            transform-origin: center;
        }
        
        /* توزيع النصوص يدويًا */
        .text-0 { top: 30px; left: 140px; transform: rotate(0deg); }
        .text-5 { top: 40px; left: 190px; transform: rotate(51deg); }
        .text-10 { top: 70px; left: 220px; transform: rotate(102deg); }
        .text-15 { top: 120px; left: 230px; transform: rotate(154deg); }
        .text-25 { top: 170px; left: 210px; transform: rotate(205deg); }
        .text-50 { top: 200px; left: 160px; transform: rotate(257deg); }
        .text-80 { top: 190px; left: 100px; transform: rotate(308deg); }
        
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ffd700;
            z-index: 10;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }
        
        .spin-btn {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            color: #333;
            font-weight: 700;
            font-size: 20px;
            padding: 16px 32px;
            border-radius: 50px;
            margin: 20px 0;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .prize-message {
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 16px;
            margin: 20px 0;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
        }
        
        .prize-message.hidden {
            display: none;
        }
        
        .prize-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .prize-item {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .prize-item:nth-child(1) { background: #FF6B6B; }
        .prize-item:nth-child(2) { background: #4ECDC4; }
        .prize-item:nth-child(3) { background: #45B7D1; }
        .prize-item:nth-child(4) { background: #96CEB4; }
        .prize-item:nth-child(5) { background: #FFE194; }
        .prize-item:nth-child(6) { background: #B8A9C9; }
        .prize-item:nth-child(7) { background: #FFD700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 عجلة الحظ</h1>
        
        <div class="balance-card">
            <div class="balance-title">رصيدك الحالي</div>
            <div class="balance-amount" id="totalPoints">0</div>
        </div>
        
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value" id="wheelBalance">0</div>
                <div class="stat-label">نقاطك</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="wheelCost">20</div>
                <div class="stat-label">تكلفة اللعب</div>
            </div>
        </div>
        
        <div class="wheel-container">
            <div class="wheel" id="wheel"></div>
            <div class="sector-texts">
                <span class="sector-text text-0">0</span>
                <span class="sector-text text-5">5</span>
                <span class="sector-text text-10">10</span>
                <span class="sector-text text-15">15</span>
                <span class="sector-text text-25">25</span>
                <span class="sector-text text-50">50</span>
                <span class="sector-text text-80">80</span>
            </div>
            <div class="pointer"></div>
        </div>
        
        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎲 ابدأ الدوران (20 نقطة)</button>
        
        <div id="prizeMessage" class="prize-message hidden">
            🎉 حصلت على <span id="prizeValue">0</span> نقطة!
        </div>
        
        <div class="prize-grid" id="prizeGrid">
            <span class="prize-item">0 نقطة</span>
            <span class="prize-item">5 نقاط</span>
            <span class="prize-item">10 نقاط</span>
            <span class="prize-item">15 نقطة</span>
            <span class="prize-item">25 نقطة</span>
            <span class="prize-item">50 نقطة</span>
            <span class="prize-item">80 نقطة</span>
        </div>
    </div>
    
    <script>
        // =========== قيم الجوائز بالترتيب (من 0° إلى 360°) ===========
        const PRIZES = [0, 5, 10, 15, 25, 50, 80];
        
        // =========== بيانات المستخدم ===========
        let totalPoints = parseInt(localStorage.getItem('totalPoints') || '0');
        let currentRotation = 0;
        let isSpinning = false;
        
        // =========== عناصر HTML ===========
        const totalPointsEl = document.getElementById('totalPoints');
        const wheelBalanceEl = document.getElementById('wheelBalance');
        const spinBtn = document.getElementById('spinBtn');
        const prizeMessage = document.getElementById('prizeMessage');
        const prizeValue = document.getElementById('prizeValue');
        const wheel = document.getElementById('wheel');
        
        // تحديث الرصيد
        function updateUI() {
            totalPointsEl.textContent = totalPoints;
            wheelBalanceEl.textContent = totalPoints;
            localStorage.setItem('totalPoints', totalPoints.toString());
        }
        updateUI();
        
        // =========== حساب الجائزة بناءً على الزاوية الفعلية ===========
        function getPrizeFromAngle(angle) {
            // تطبيع الزاوية بين 0 و 360
            const normalizedAngle = ((angle % 360) + 360) % 360;
            
            // تحديد القطاع بناءً على الزاوية
            if (normalizedAngle >= 0 && normalizedAngle < 51.43) return PRIZES[0];
            if (normalizedAngle >= 51.43 && normalizedAngle < 102.86) return PRIZES[1];
            if (normalizedAngle >= 102.86 && normalizedAngle < 154.29) return PRIZES[2];
            if (normalizedAngle >= 154.29 && normalizedAngle < 205.72) return PRIZES[3];
            if (normalizedAngle >= 205.72 && normalizedAngle < 257.15) return PRIZES[4];
            if (normalizedAngle >= 257.15 && normalizedAngle < 308.58) return PRIZES[5];
            return PRIZES[6]; // 308.58 - 360
        }
        
        // =========== تدوير العجلة ===========
        function spinWheel() {
            if (isSpinning) return;
            
            if (totalPoints < 20) {
                alert('❌ رصيدك غير كافٍ! تحتاج 20 نقطة للعب');
                return;
            }
            
            // خصم النقاط
            totalPoints -= 20;
            updateUI();
            
            isSpinning = true;
            spinBtn.disabled = true;
            prizeMessage.classList.add('hidden');
            
            // عدد اللفات (5-8 لفات)
            const spins = 5 + Math.floor(Math.random() * 4);
            // زاوية عشوائية إضافية (0-360)
            const randomAngle = Math.random() * 360;
            // الزاوية النهائية = اللفات × 360 + عشوائي
            const targetAngle = spins * 360 + randomAngle;
            currentRotation += targetAngle;
            
            // تطبيق الدوران مع تأثير التباطؤ (cubic-bezier)
            wheel.style.transition = 'transform 4s cubic-bezier(0.25, 0.1, 0.25, 1)';
            wheel.style.transform = `rotate(${currentRotation}deg)`;
            
            // بعد انتهاء الدوران (4 ثواني)
            setTimeout(() => {
                // إزالة الانتقال (transition) لمنع أي تحرك إضافي
                wheel.style.transition = '';
                
                // حساب الجائزة
                const prize = getPrizeFromAngle(currentRotation);
                
                // إضافة النقاط
                totalPoints += prize;
                updateUI();
                
                // عرض النتيجة
                prizeValue.textContent = prize;
                prizeMessage.classList.remove('hidden');
                
                isSpinning = false;
                spinBtn.disabled = false;
                
            }, 4000);
        }
    </script>
</body>
</html>
