<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earn Mini App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
margin-top:20px;
}

button{

width:90%;
max-width:300px;
padding:15px;
margin:10px;

border:none;
border-radius:10px;

font-size:18px;

background:#2563eb;
color:white;

cursor:pointer;

}

button:hover{
background:#1d4ed8;
}

.card{

background:#1e293b;
padding:20px;
border-radius:12px;

margin-bottom:20px;

}

</style>

</head>

<body>

<h1>💰 Earn Mini App</h1>

<div class="card">

<p>اكسب النقاط عبر مشاهدة الإعلانات</p>

</div>

<button onclick="watchAd()">
📺 مشاهدة إعلان
</button>

<button onclick="dailyCheckin()">
✅ تسجيل يومي
</button>

<button onclick="checkBalance()">
💰 عرض الرصيد
</button>

<script>

const tg = window.Telegram.WebApp

tg.expand()
tg.ready()

function watchAd(){

tg.showAlert("انتظر 15 ثانية بعد مشاهدة الإعلان")

Telegram.WebApp.sendData("watch_ad")

}

function dailyCheckin(){

Telegram.WebApp.sendData("checkin")

}

function checkBalance(){

Telegram.WebApp.sendData("balance")

}

</script>

</body>
</html>
