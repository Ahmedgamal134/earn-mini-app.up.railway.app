    <style>
        /* كل التنسيقات السابقة كما هي */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            width: 100%;

            display: flex;

        }

            text-align: center;

<body>
    <div class="container">
        <h1>💰 بوت الربح الذكي</h1>
        <div class="subtitle">شاهد الإعلانات واكسب نقاط</div>
        
        <div class="timer-container">
            <div class="timer" id="timer">30</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress" style="width: 100%"></div>
            </div>
        </div>
        
        <div class="ad-buttons">
            <button class="btn btn-video" id="videoAdBtn" onclick="startAd('video')">
                <span>▶️</span> شاهد إعلان فيديو
            </button>
            <button class="btn btn-inpage" id="inpageAdBtn" onclick="startAd('inpage')">
                <span>📄</span> شاهد إعلان
            </button>
        </div>
        
        <button class="btn btn-claim hidden" id="claimBtn" onclick="claimReward()">
            <span>🎁</span> استلم نقاطك
        </button>
        
        <div class="status" id="status">
            ⏳ اضغط على أي إعلان للمشاهدة
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="todayCount">0</div>
                <div>إعلانات اليوم</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalPoints">0</div>
                <div>نقاطك</div>
            </div>
        </div>
    </div>
    
    <script>
        // =========== إعدادات OnClickA ===========
        let videoShow = null;
        let inpageShow = null;
        let currentAdType = null;
        let adWatched = false;
        
        // تهيئة إعلان الفيديو (Spot ID: 6113667)
        window.initCdTma?.({ id: '6113667' })
            .then(show => {
                videoShow = show;
                console.log('✅ Video ad initialized');
            })
            .catch(e => console.log('❌ Video init error:', e));
        
        // تهيئة إعلان Inpage (Spot ID: 6113666) ✅ الرقم الصحيح
        window.initTma?.({ id: '6113666' })
            .then(show => {
                inpageShow = show;
                console.log('✅ Inpage ad initialized');
            })
            .catch(e => console.log('❌ Inpage init error:', e));
        
        // =========== متغيرات المؤقت ===========
        let timeLeft = 30;
        let timerInterval = null;
        let countdownActive = false;
        const timerElement = document.getElementById('timer');
        const progressElement = document.getElementById('progress');
        const statusElement = document.getElementById('status');
        const claimBtn = document.getElementById('claimBtn');
        const videoAdBtn = document.getElementById('videoAdBtn');
        const inpageAdBtn = document.getElementById('inpageAdBtn');
        const todayCountElement = document.getElementById('todayCount');
        const totalPointsElement = document.getElementById('totalPoints');
        
        let todayAds = parseInt(localStorage.getItem('todayAds') || '0');
        let totalPoints = parseInt(localStorage.getItem('totalPoints') || '0');
        let lastAdDate = localStorage.getItem('lastAdDate') || '';
        
        function checkDate() {
            const today = new Date().toDateString();
            if (lastAdDate !== today) {
                todayAds = 0;
                localStorage.setItem('todayAds', '0');
                localStorage.setItem('lastAdDate', today);
            }
        }
        checkDate();
        updateStats();
        
        function updateStats() {
            todayCountElement.textContent = todayAds;
            totalPointsElement.textContent = totalPoints;
        }
        
        function startAd(type) {
            if (countdownActive) {
                alert('⏳ يوجد إعلان قيد المشاهدة حالياً');
                return;
            }
            
            if (todayAds >= 400) {
                alert('❌ لقد استنفدت حد الإعلانات اليومي (400 إعلان)');
                return;
            }
            
            let showFunc = type === 'video' ? videoShow : inpageShow;
            if (!showFunc) {
                alert('الإعلان لم يتم تحميله بعد، حاول مرة أخرى');
                return;
            }
            
            videoAdBtn.disabled = true;
            inpageAdBtn.disabled = true;
            countdownActive = true;
            currentAdType = type;
            adWatched = false;
            
            showFunc()
                .then(() => {
                    console.log(`✅ ${type} ad started`);
                    statusElement.innerHTML = '📺 يتم تشغيل الإعلان...';
                    
                    setTimeout(() => {
                        startCountdown();
                    }, 1000);
                })
                .catch(e => {
                    console.log(`❌ ${type} ad error:`, e);
                    statusElement.innerHTML = '❌ حدث خطأ في تشغيل الإعلان';
                    resetButtons();
                });
        }
        
        function startCountdown() {
            timeLeft = 30;
            timerElement.textContent = timeLeft;
            progressElement.style.width = '100%';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                let progressPercent = (timeLeft / 30) * 100;
                progressElement.style.width = progressPercent + '%';
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerElement.textContent = '0';
                    progressElement.style.width = '0%';
                    countdownActive = false;
                    adWatched = true;
                    
                    statusElement.innerHTML = '✅ تمت المشاهدة! اضغط على استلام النقاط';
                    claimBtn.classList.remove('hidden');
                    
                    videoAdBtn.disabled = false;
                    inpageAdBtn.disabled = false;
                }
            }, 1000);
        }
        
        function claimReward() {
            if (!adWatched) {
                alert('❌ يجب مشاهدة الإعلان أولاً!');
                return;
            }
            
            todayAds++;
            totalPoints++;
            localStorage.setItem('todayAds', todayAds.toString());
            localStorage.setItem('totalPoints', totalPoints.toString());
            localStorage.setItem('lastAdDate', new Date().toDateString());
            updateStats();
            
            claimBtn.classList.add('hidden');
            statusElement.innerHTML = '✅ تم إضافة نقطة! شكراً لمشاهدتك الإعلان';
            
            adWatched = false;
            currentAdType = null;
            
            videoAdBtn.disabled = false;
            inpageAdBtn.disabled = false;
        }
        
        function resetButtons() {
            videoAdBtn.disabled = false;
            inpageAdBtn.disabled = false;
            countdownActive = false;
        }
        
        window.addEventListener('load', () => {
            claimBtn.addEventListener('click', (e) => {
                if (!adWatched) {
                    e.preventDefault();
                    alert('❌ لازم تشوف الإعلان الأول!');
                }
            });
        });
    </script>
</body>
