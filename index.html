<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة إعلان - بوت الربح</title>
    
    <!-- مكتبة OnClickA الأساسية (مهمة جداً) -->
    <script async src="https://js.onclckmn.com/static/onclicka.js" data-admpid="6113666"></script>
    
    <!-- مكتبة Inpage -->
    <script src="https://js.onclckvd.com/tma/inpage.js" data-spotid="6113666"></script>
    
    <!-- مكتبة الفيديو (اختياري) -->
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
        }
        .timer {
            font-size: 72px;
            font-weight: bold;
            margin: 30px 0;
            color: #ffd700;
        }
        .message {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
            border: none;
            color: #333;
            font-weight: bold;
            font-size: 18px;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-video {
            background: linear-gradient(135deg, #6b8cff 0%, #4a6cf7 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 بوت الربح الذكي</h1>
        
        <div class="message">
            <h2>📺 شاهد الإعلان واكسب نقاط</h2>
            <p>انتظر 15 ثانية بعد مشاهدة الإعلان</p>
        </div>
        
        <div class="timer" id="timer">15</div>
        
        <!-- أزرار الإعلانات -->
        <div>
            <button class="btn" onclick="playAd('inpage')">📺 شاهد إعلان Inpage</button>
            <button class="btn btn-video" onclick="playAd('video')">📹 شاهد إعلان فيديو</button>
        </div>
        
        <!-- حاوية إعلان Inpage (الأهم) -->
        <div data-nat="6113666"></div>
        
        <div class="message" id="status">
            شاهد الإعلان وانتظر...
        </div>
    </div>
    
    <script>
        // =========== إعدادات OnClickA ===========
        let inpageShow = null;
        let videoShow = null;
        let adWatched = false;
        let timerInterval = null;
        
        // تهيئة إعلان Inpage
        window.initTma?.({ id: '6113666' })
            .then(show => {
                inpageShow = show;
                console.log('✅ Inpage ad ready');
                document.getElementById('status').innerHTML = '✅ الإعلان جاهز';
            })
            .catch(e => {
                console.log('❌ Inpage init error:', e);
                document.getElementById('status').innerHTML = '❌ فشل تحميل الإعلان';
            });
        
        // تهيئة إعلان الفيديو
        window.initCdTma?.({ id: '6113667' })
            .then(show => {
                videoShow = show;
                console.log('✅ Video ad ready');
            })
            .catch(e => console.log('❌ Video init error:', e));
        
        // =========== تشغيل الإعلانات ===========
        function playAd(type) {
            let showFunc = type === 'inpage' ? inpageShow : videoShow;
            
            if (!showFunc) {
                alert('الإعلان لم يتم تحميله بعد، حاول مرة أخرى');
                return;
            }
            
            // تعطيل الأزرار
            document.querySelectorAll('.btn').forEach(btn => btn.disabled = true);
            
            showFunc()
                .then(() => {
                    console.log(`✅ ${type} ad played`);
                    document.getElementById('status').innerHTML = '📺 يتم تشغيل الإعلان...';
                    startTimer();
                })
                .catch(e => {
                    console.log(`❌ ${type} ad error:`, e);
                    document.getElementById('status').innerHTML = '❌ حدث خطأ';
                    document.querySelectorAll('.btn').forEach(btn => btn.disabled = false);
                });
        }
        
        // =========== المؤقت ونظام النقاط ===========
        function startTimer() {
            let timeLeft = 15;
            const timerEl = document.getElementById('timer');
            const statusEl = document.getElementById('status');
            
            timerEl.textContent = timeLeft;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerEl.textContent = '0';
                    adWatched = true;
                    statusEl.innerHTML = '✅ تمت المشاهدة! يمكنك استلام نقاطك';
                    
                    // إعادة تفعيل الأزرار
                    document.querySelectorAll('.btn').forEach(btn => btn.disabled = false);
                }
            }, 1000);
        }
    </script>
</body>
</html>
