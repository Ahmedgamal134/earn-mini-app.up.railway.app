<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Earn App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

h1{
margin-bottom:20px;
}

button{

width:100%;
padding:14px;
margin:8px 0;

border:none;
border-radius:10px;

font-size:16px;

background:#2563eb;
color:white;

cursor:pointer;

}

button:disabled{
background:#64748b;
}

.card{

background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:10px;

}

#wheel{

width:220px;
height:220px;

border-radius:50%;

border:6px solid white;

margin:auto;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;

background:conic-gradient(
gold 0deg 60deg,
green 60deg 120deg,
orange 120deg 180deg,
red 180deg 240deg,
blue 240deg 300deg,
purple 300deg 360deg
);

}

</style>

</head>

<body>

<div class="container">

<h1>💰 Earn Mini App</h1>

<div class="card">

<button onclick="watchAd()">
📺 مشاهدة إعلان
</button>

<button onclick="dailyCheckin()">
🎁 تسجيل يومي
</button>

<button onclick="spinWheel()">
🎡 عجلة الحظ
</button>

<button onclick="inviteFriends()">
👥 دعوة أصدقاء
</button>

<button onclick="checkBalance()">
💰 عرض الرصيد
</button>

</div>

<div id="wheel">
🎡
</div>

</div>

<script>

const tg = window.Telegram.WebApp

tg.expand()
tg.ready()

// ---------------- ADS ----------------

let showAd

const spotIDs = [
'6113782',
'6113667',
'6113781'
]

const randomSpot = spotIDs[Math.floor(Math.random()*spotIDs.length)]

window.initCdTma?.({ id: randomSpot })
.then(show => {

showAd = show

})
.catch(e => console.log(e))


function watchAd(){

if(!showAd){

alert("الاعلان لم يجهز بعد")

return

}

showAd()

.then(()=>{

Telegram.WebApp.sendData("watch_ad")

})

.catch(e => console.log(e))

}


// ---------------- DAILY ----------------

function dailyCheckin(){

Telegram.WebApp.sendData("checkin")

alert("تم تسجيل الدخول اليومي")

}


// ---------------- BALANCE ----------------

function checkBalance(){

Telegram.WebApp.sendData("balance")

}


// ---------------- REFERRAL ----------------

function inviteFriends(){

Telegram.WebApp.sendData("refer")

alert("شارك رابط الدعوة مع أصدقائك")

}


// ---------------- WHEEL ----------------

let spinning = false

function spinWheel(){

if(spinning) return

spinning = true

let wheel = document.getElementById("wheel")

let deg = Math.floor(Math.random()*360)+720

wheel.style.transition = "transform 3s"

wheel.style.transform = "rotate("+deg+"deg)"

setTimeout(()=>{

let reward = Math.floor(Math.random()*10)+1

Telegram.WebApp.sendData("wheel_"+reward)

alert("ربحت "+reward+" نقاط")

spinning = false

},3000)

}

</script>

</body>
</html>
