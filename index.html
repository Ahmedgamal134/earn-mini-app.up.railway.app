<!DOCTYPE html>
<html>
<head>
    <title>Earn Bot Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        button { background: #0088cc; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; margin: 10px; cursor: pointer; }
        button:hover { background: #006699; }
        .points { font-size: 24px; margin: 20px; }
    </style>
</head>
<body>
    <h1>🚀 Earn Bot</h1>
    <div class="points">Points: <span id="points">0</span></div>
    
    <button onclick="watchAd()">📺 Watch Ad (+5)</button>
    <button onclick="spinWheel()">🎰 Spin Wheel</button>
    <button onclick="dailyCheckin()">✅ Daily Check</button>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Send data to bot
        function sendData(action, value=0) {
            tg.sendData(action + '_' + value);
            tg.MainButton.text = 'Success!';
            tg.MainButton.show();
            setTimeout(() => tg.MainButton.hide(), 2000);
        }
        
        function watchAd() {
            sendData('watch_ad');
            document.getElementById('points').innerText = parseInt(document.getElementById('points').innerText) + 5;
        }
        
        function spinWheel() {
            const rewards = [5, 10, 15, 25, 50];
            const reward = rewards[Math.floor(Math.random() * rewards.length)];
            sendData('wheel', reward);
            document.getElementById('points').innerText = parseInt(document.getElementById('points').innerText) + reward;
        }
        
        function dailyCheckin() {
            sendData('checkin');
            document.getElementById('points').innerText = parseInt(document.getElementById('points').innerText) + 10;
        }
    </script>
</body>
</html>
