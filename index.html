<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوت الربح الذكي - عجلة الحظ</title>
    
    <!-- مكتبة Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
        }
        
        .content {
            padding: 20px 16px;
            max-width: 480px;
            margin: 0 auto;
            text-align: center;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .balance-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .balance-amount {
            font-size: 48px;
            font-weight: 700;
            color: #ffd700;
            margin: 10px 0;
        }
        
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.15, 1);
        }
        
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ffd700;
            z-index: 10;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .spin-btn {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            color: #333;
            font-weight: 700;
            font-size: 20px;
            padding: 16px 32px;
            border-radius: 50px;
            margin: 10px 0;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .prize-message {
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 16px;
            margin: 20px 0;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
        }
        
        .prize-message.hidden {
            display: none;
        }
        
        .prize-message span {
            color: #ffd700;
        }
        
        .prizes-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 20px 0;
        }
        
        .prize-item {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>🎡 عجلة الحظ</h1>
        
        <div class="balance-card">
            <div style="opacity: 0.8;">رصيدك الحالي</div>
            <div class="balance-amount" id="totalPoints">0</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="wheelBalance">0</div>
                <div class="stat-label">نقاطك</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="wheelCost">20</div>
                <div class="stat-label">تكلفة اللعب</div>
            </div>
        </div>
        
        <div class="wheel-container">
            <canvas id="wheelCanvas" width="280" height="280"></canvas>
            <div class="pointer"></div>
        </div>
        
        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎲 ابدأ الدوران (20 نقطة)</button>
        
        <div id="prizeMessage" class="prize-message hidden">
            🎉 <span id="prizeAmount">0</span> نقطة!
        </div>
        
        <div class="prizes-grid" id="prizesGrid"></div>
    </div>
    
    <script>
        // =========== بيانات المستخدم (مخزنة محلياً) ===========
        let totalPoints = parseInt(localStorage.getItem('totalPoints') || '0');
        
        // عناصر HTML
        const totalPointsEl = document.getElementById('totalPoints');
        const wheelBalanceEl = document.getElementById('wheelBalance');
        const spinBtn = document.getElementById('spinBtn');
        const prizeMessage = document.getElementById('prizeMessage');
        const prizeAmount = document.getElementById('prizeAmount');
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        
        // تحديث الرصيد في الواجهة
        function updateUI() {
            totalPointsEl.textContent = totalPoints;
            if (wheelBalanceEl) wheelBalanceEl.textContent = totalPoints;
            localStorage.setItem('totalPoints', totalPoints.toString());
        }
        updateUI();
        
        // =========== عجلة الحظ (7 قطاعات) ===========
        const segments = [
            { color: '#FF6B6B', label: '0', value: 0 },
            { color: '#4ECDC4', label: '5', value: 5 },
            { color: '#45B7D1', label: '10', value: 10 },
            { color: '#96CEB4', label: '15', value: 15 },
            { color: '#FFE194', label: '25', value: 25 },
            { color: '#B8A9C9', label: '50', value: 50 },
            { color: '#FFD700', label: '80', value: 80 }
        ];
        
        // رسم الجوائز في الأسفل
        const prizesGrid = document.getElementById('prizesGrid');
        segments.forEach(seg => {
            const item = document.createElement('span');
            item.className = 'prize-item';
            item.style.background = seg.color;
            item.style.color = '#000';
            item.textContent = seg.label + ' نقطة';
            prizesGrid.appendChild(item);
        });
        
        // رسم العجلة
        function drawWheel() {
            const angleStep = (Math.PI * 2) / segments.length;
            ctx.clearRect(0, 0, 280, 280);
            
            segments.forEach((seg, index) => {
                const startAngle = index * angleStep;
                const endAngle = startAngle + angleStep;
                
                // رسم القطاع
                ctx.beginPath();
                ctx.fillStyle = seg.color;
                ctx.moveTo(140, 140);
                ctx.arc(140, 140, 140, startAngle, endAngle);
                ctx.closePath();
                ctx.fill();
                
                // كتابة القيمة
                ctx.save();
                ctx.translate(140, 140);
                ctx.rotate(startAngle + angleStep / 2);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#000';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(seg.label, 80, 0);
                ctx.restore();
            });
        }
        drawWheel();
        
        let isSpinning = false;
        let currentRotation = 0;
        
        // حساب الجائزة بدقة 100%
        function calculatePrize(finalAngle) {
            // تطبيع الزاوية بين 0 و 360
            const normalizedAngle = ((finalAngle % 360) + 360) % 360;
            
            // زاوية المؤشر (في أعلى 90 درجة)
            const pointerAngle = (normalizedAngle + 90) % 360;
            
            // حجم القطاع
            const segmentAngle = 360 / segments.length;
            
            // حساب رقم القطاع (0-based)
            const index = Math.floor(pointerAngle / segmentAngle) % segments.length;
            
            return segments[index];
        }
        
        function spinWheel() {
            if (isSpinning) return;
            
            if (totalPoints < 20) {
                alert('❌ رصيدك غير كافٍ! تحتاج 20 نقطة للعب');
                return;
            }
            
            // خصم النقاط
            totalPoints -= 20;
            updateUI();
            
            isSpinning = true;
            spinBtn.disabled = true;
            prizeMessage.classList.add('hidden');
            
            // دوران عشوائي (5-8 لفات)
            const spinAngle = Math.random() * 1080 + 1800;
            currentRotation += spinAngle;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            // بعد انتهاء الدوران
            setTimeout(() => {
                const prize = calculatePrize(currentRotation);
                
                totalPoints += prize.value;
                updateUI();
                
                prizeAmount.textContent = prize.value;
                prizeMessage.classList.remove('hidden');
                
                setTimeout(() => {
                    isSpinning = false;
                    spinBtn.disabled = false;
                }, 2000);
                
            }, 4000);
        }
    </script>
</body>
</html>
