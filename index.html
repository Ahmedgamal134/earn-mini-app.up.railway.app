<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Mini App - عجلة الحظ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
</head>
<body>
    <div class="container">
        <!-- رأس الصفحة -->
        <div class="header">
            <div class="user-info">
                <span class="username" id="username">المستخدم</span>
                <div class="points-balance">
                    <span class="points-icon">💰</span>
                    <span id="userPoints">0</span> نقطة
                </div>
            </div>
            <div class="daily-checkin">
                <button id="checkinBtn" class="btn-checkin">
                    <span class="icon">📅</span>
                    تسجيل الدخول اليومي (+10)
                </button>
            </div>
        </div>

        <!-- عجلة الحظ -->
        <div class="wheel-container">
            <h2>🎡 عجلة الحظ</h2>
            <div class="wheel-wrapper">
                <canvas id="wheelCanvas" width="300" height="300"></canvas>
                <button id="spinBtn" class="btn-spin" disabled>لف العجلة (5 نقاط)</button>
            </div>
            <div class="spin-info">
                <span>اللفات المتاحة: <span id="availableSpins">0</span></span>
                <button id="watchAdForSpins" class="btn-ad">شاهد إعلان للحصول على لفتين</button>
            </div>
        </div>

        <!-- الإعلانات الثلاثة -->
        <div class="ads-section">
            <h3>📺 شاهد إعلانات</h3>
            <div class="ads-grid">
                <div class="ad-item" data-spot-id="6113782">
                    <button class="btn-ad" onclick="playAd('6113782')">
                        شاهد إعلان 1
                    </button>
                    <span class="cooldown" id="cooldown1"></span>
                </div>
                <div class="ad-item" data-spot-id="6113667">
                    <button class="btn-ad" onclick="playAd('6113667')">
                        شاهد إعلان 2
                    </button>
                    <span class="cooldown" id="cooldown2"></span>
                </div>
                <div class="ad-item" data-spot-id="6113781">
                    <button class="btn-ad" onclick="playAd('6113781')">
                        شاهد إعلان 3
                    </button>
                    <span class="cooldown" id="cooldown3"></span>
                </div>
            </div>
        </div>

        <!-- دعوة الأصدقاء -->
        <div class="referral-section">
            <h3>👥 دعوة الأصدقاء</h3>
            <div class="referral-box">
                <p>ادع صديقاً حقيقياً واكسب 30 نقطة عند إنجاز المهمة</p>
                <div class="referral-input">
                    <input type="text" id="friendUsername" placeholder="معرف الصديق في التليجرام" dir="ltr">
                    <button id="inviteFriendBtn" class="btn-primary">دعوة</button>
                </div>
                <div class="referral-stats">
                    <span>الأصدقاء المدعوين: <span id="referralCount">0</span></span>
                    <span>النقاط المكتسبة: <span id="referralPoints">0</span></span>
                </div>
            </div>
        </div>

        <!-- المحفظة والسحب -->
        <div class="wallet-section">
            <h3>💰 المحفظة والسحب</h3>
            <div class="wallet-balance">
                <span>رصيد المحفظة: <span id="walletBalance">0</span> نقطة</span>
                <button id="withdrawBtn" class="btn-withdraw">سحب الأرباح</button>
            </div>
            
            <!-- نافذة السحب المنبثقة -->
            <div id="withdrawModal" class="modal">
                <div class="modal-content">
                    <span class="close">&times;</span>
                    <h3>طلب سحب الأرباح</h3>
                    <div class="payment-methods">
                        <div class="payment-method" data-method="orange">
                            <img src="https://cdn-icons-png.flaticon.com/128/15466/15466173.png" alt="Orange Cash">
                            <span>اورانج كاش</span>
                        </div>
                        <div class="payment-method" data-method="vodafone">
                            <img src="https://cdn-icons-png.flaticon.com/128/15466/15466173.png" alt="Vodafone Cash">
                            <span>فودافون كاش</span>
                        </div>
                        <div class="payment-method" data-method="etisalat">
                            <img src="https://cdn-icons-png.flaticon.com/128/15466/15466173.png" alt="Etisalat Cash">
                            <span>اتصالات كاش</span>
                        </div>
                        <div class="payment-method" data-method="paypal">
                            <img src="https://cdn-icons-png.flaticon.com/128/15466/15466173.png" alt="PayPal">
                            <span>PayPal</span>
                        </div>
                    </div>
                    <form id="withdrawForm" style="display: none;">
                        <input type="text" id="accountDetails" placeholder="بيانات الحساب" required>
                        <input type="number" id="withdrawAmount" placeholder="المبلغ" min="100" required>
                        <button type="submit">تقديم الطلب</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
