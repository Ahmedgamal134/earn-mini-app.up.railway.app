<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة إعلان - بوت الربح</title>
    
    <!-- 1. مكتبة OnClickA (Video Rewarded) -->
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
    
    <!-- 2. مكتبة TADS (احتياطي - اختياري) -->
    <script src="https://w.tads.me/widget.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
        }
        .timer {
            font-size: 72px;
            font-weight: bold;
            margin: 30px 0;
            color: #ffd700;
        }
        .message {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .ad-container {
            margin: 20px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            min-height: 200px;
        }
        .watch-btn {
            background: linear-gradient(135deg, #ffd700 0%, #ffa500 100%);
            border: none;
            color: #333;
            font-weight: bold;
            font-size: 18px;
            padding: 15px 30px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 15px 0;
        }
        .watch-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 بوت الربح الذكي</h1>
        
        <div class="message">
            <h2>📺 شاهد الإعلان واكسب نقاط</h2>
            <p>انتظر 15 ثانية بعد مشاهدة الإعلان</p>
        </div>
        
        <div class="timer" id="timer">15</div>
        
        <!-- زر مشاهدة الإعلان من OnClickA -->
        <button class="watch-btn" onclick="playOnClickAAd()">
            ▶️ شاهد إعلان فيديو
        </button>
        
        <!-- حاوية لعرض إعلانات TADS (احتياطي) -->
        <div id="tads-container-9544" class="ad-container"></div>
        
        <div class="message" id="status">
            شاهد الإعلان وانتظر...
        </div>
    </div>
    
    <script>
        // =========== OnClickA Video Ad ===========
        let onClickAShow = null;
        
        // تهيئة محرك الإعلانات OnClickA مع Spot ID 431049
        window.initCdTma?.({ id: '431049' })
            .then(show => {
                onClickAShow = show;
                console.log('✅ OnClickA ad initialized');
            })
            .catch(e => console.log('❌ OnClickA init error:', e));
        
        // دالة تشغيل الإعلان عند الضغط على الزر
        function playOnClickAAd() {
            if (!onClickAShow) {
                alert('الإعلان لم يتم تحميله بعد، حاول مرة أخرى');
                return;
            }
            
            onClickAShow()
                .then(() => {
                    console.log('✅ OnClickA ad played');
                    // هنا المستخدم شاف الإعلان، نبدأ المؤقت
                    startTimer();
                })
                .catch(e => {
                    console.log('❌ OnClickA ad error:', e);
                    alert('حدث خطأ في تشغيل الإعلان');
                });
        }
        
        // =========== TADS Ad (احتياطي) ===========
        const initTads = () => {
            if (typeof window.tads === 'undefined' || typeof window.tads.init !== 'function') {
                return;
            }

            const adController = window.tads.init({
                widgetId: 9544,
                type: 'static',
                debug: false,
                onAdsNotFound: () => {
                    console.log('⚠️ لا توجد إعلانات TADS متاحة');
                }
            });

            adController.loadAd()
                .then(() => adController.showAd())
                .catch((err) => {
                    console.log('❌ TADS error:', err);
                });
        };

        // تشغيل TADS بعد تحميل الصفحة
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initTads);
        } else {
            initTads();
        }
        
        // =========== المؤقت ونظام النقاط ===========
        let timeLeft = 15;
        const timerElement = document.getElementById('timer');
        const statusElement = document.getElementById('status');
        let timerInterval = null;
        
        function startTimer() {
            // إعادة تعيين المؤقت
            timeLeft = 15;
            timerElement.style.display = 'block';
            timerElement.textContent = timeLeft;
            statusElement.innerHTML = 'شاهد الإعلان وانتظر...';
            
            // إيقاف أي مؤقت سابق
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerElement.style.display = 'none';
                    statusElement.innerHTML = '✅ تمت المشاهدة! يمكنك العودة للبوت لاستلام نقاطك';
                }
            }, 1000);
        }
    </script>
</body>
</html>
