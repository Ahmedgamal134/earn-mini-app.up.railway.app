<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Earn Pro - كسب النقاط</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.8s ease-out;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(45deg, #FFD700, #FFA500, #FF6347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .points-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 2px solid rgba(255,255,255,0.2);
            animation: bounceIn 1s ease-out;
        }

        .points-display {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .level-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .level-progress {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc6a);
            border-radius: 4px;
            width: 65%;
            transition: width 0.5s ease;
        }

        .main-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(45deg, #0088cc, #00aaff);
            color: white;
            border: none;
            padding: 18px 15px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,136,204,0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(0,136,204,0.4);
        }

        .btn-success {
            background: linear-gradient(45deg, #00c851, #00ff88);
            box-shadow: 0 8px 25px rgba(0,200,81,0.3);
        }

        .btn-warning {
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            box-shadow: 0 8px 25px rgba(255,107,53,0.3);
        }

        .full-btn {
            width: 100%;
            grid-column: 1 / -1;
            background: linear-gradient(45deg, #ff4081, #f50057);
            font-size: 18px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .wheel-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 350px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .wheel-container.active {
            transform: translate(-50%, -50%) scale(1);
        }

        .wheel {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 20px auto;
            position: relative;
            transition: transform 3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .close-wheel {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🚀 Earn Pro</div>
            <div>الكسب السهل والسريع!</div>
        </div>

        <div class="points-section">
            <div>رصيدك الحالي</div>
            <div class="points-display" id="points">0</div>
            <div>المستوى 1</div>
            <div class="level-bar">
                <div class="level-progress" id="levelProgress"></div>
            </div>
        </div>

        <div class="main-buttons">
            <button class="btn" onclick="watchAd()">
                📺 شاهد إعلان
                <div>+5 💎</div>
            </button>
            <button class="btn btn-warning" onclick="spinWheel()">
                🎰 عجلة الحظ
                <div>+25 💎</div>
            </button>
            <button class="btn btn-success" onclick="dailyCheckin()">
                ✅ تسجيل يومي
                <div>+15 💎</div>
            </button>
            <button class="btn" onclick="inviteFriends()">
                👥 دعوة أصدقاء
                <div>+50 💎</div>
            </button>
        </div>

        <button class="btn full-btn" onclick="withdraw()">
            💳 سحب الأرباح
        </button>
    </div>

    <!-- عجلة الحظ -->
    <div class="wheel-container" id="wheelModal">
        <div style="font-size: 24px; margin-bottom: 20px;">🎰 عجلة الحظ</div>
        <canvas id="wheelCanvas" width="200" height="200"></canvas>
        <button class="close-wheel" onclick="closeWheel()">إغلاق</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingByOutsideTap = true;
        
        let points = 0;
        let spinAngle = 0;

        // تحديث النقاط
        function updatePoints() {
            document.getElementById('points').innerText = points;
            const progress = Math.min((points % 100) / 100 * 100, 100);
            document.getElementById('levelProgress').style.width = progress + '%';
        }

        // مشاهدة إعلان
        function watchAd() {
            tg.sendData('watch_ad');
            points += 5;
            updatePoints();
            showSuccess('تم مشاهدة الإعلان! +5 نقطة');
        }

        // عجلة الحظ
        function spinWheel() {
            showWheel();
        }

        function showWheel() {
            document.getElementById('wheelModal').classList.add('active');
            
            const rewards = [5, 10, 15, 25, 50, 100];
            const randomReward = rewards[Math.floor(Math.random() * rewards.length)];
            
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            
            // رسم العجلة
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 90;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for(let i = 0; i < rewards.length; i++) {
                const angle = (Math.PI * 2 / rewards.length) * i;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + Math.PI * 2 / rewards.length);
                ctx.fillStyle = `hsl(${(i * 60) % 360}, 70%, 60%)`;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX + Math.cos(angle + Math.PI * 2 / rewards.length / 2) * 40, 
                             centerY + Math.sin(angle + Math.PI * 2 / rewards.length / 2) * 40);
                ctx.rotate(angle + Math.PI * 2 / rewards.length / 2);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Cairo';
                ctx.textAlign = 'left';
                ctx.fillText(rewards[i] + '💎', 5, 5);
                ctx.restore();
            }
            
            // دوران العجلة
            const spinDuration = 3000;
            const startTime = Date.now();
            const finalRotation = Math.random() * Math.PI * 2;
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / spinDuration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                spinAngle = easeOut * (finalRotation + Math.PI * 10);
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(-spinAngle);
                ctx.drawImage(canvas, 0, 0);
                ctx.restore();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    tg.sendData('wheel_' + randomReward);
                    points += randomReward;
                    updatePoints();
                    showSuccess('مبروك! فزت بـ ' + randomReward + ' نقطة!');
                }
            }
            animate();
        }

        function closeWheel() {
            document.getElementById('wheelModal').classList.remove('active');
        }

        // تسجيل يومي
        function dailyCheckin() {
            tg.sendData('checkin');
            points += 15;
            updatePoints();
            showSuccess('تسجيل يومي ناجح! +15 نقطة');
        }

        // دعوة أصدقاء
        function inviteFriends() {
            tg.sendData('invite');
            points += 50;
            updatePoints();
            showSuccess('تم مشاركة الرابط! +50 نقطة');
        }

        // سحب
        function withdraw() {
            if (points >= 100) {
                tg.sendData('withdraw_fawry_' + points);
                showSuccess('تم إرسال طلب السحب!');
            } else {
                showError('الحد الأدنى للسحب 100 نقطة');
            }
        }

        function showSuccess(message) {
            tg.showAlert(message);
        }

        function showError(message) {
            tg.showAlert(message);
        }

        // تحميل النقاط من البوت
        tg.onEvent('mainButtonClicked', function() {
            tg.MainButton.setText('تم!');
            tg.MainButton.show();
            setTimeout(() => tg.MainButton.hide(), 2000);
        });

        updatePoints();
    </script>
</body>
</html>
