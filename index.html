<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عجلة الحظ - بوت الربح الذكي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 480px;
            width: 100%;
            padding: 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .balance-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .balance-title {
            font-size: 16px;
            opacity: 0.8;
        }
        
        .balance-amount {
            font-size: 48px;
            font-weight: 700;
            color: #ffd700;
            margin-top: 5px;
        }
        
        .wheel-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 4s ease-out;
        }
        
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ffd700;
            z-index: 10;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
        }
        
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .spin-btn {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            color: #333;
            font-weight: 700;
            font-size: 20px;
            padding: 16px 32px;
            border-radius: 50px;
            margin: 20px 0;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .prize-message {
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 16px;
            margin: 20px 0;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #ffd700;
        }
        
        .prize-message.hidden {
            display: none;
        }
        
        .prize-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        
        .prize-item {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 عجلة الحظ</h1>
        
        <div class="balance-card">
            <div class="balance-title">رصيدك الحالي</div>
            <div class="balance-amount" id="totalPoints">0</div>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="wheelBalance">0</div>
                <div class="stat-label">نقاطك</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="wheelCost">20</div>
                <div class="stat-label">تكلفة اللعب</div>
            </div>
        </div>
        
        <div class="wheel-wrapper">
            <canvas id="wheelCanvas" width="280" height="280"></canvas>
            <div class="pointer"></div>
        </div>
        
        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎲 ابدأ الدوران (20 نقطة)</button>
        
        <div id="prizeMessage" class="prize-message hidden">
            🎉 حصلت على <span id="prizeValue">0</span> نقطة!
        </div>
        
        <div class="prize-grid" id="prizeGrid"></div>
    </div>
    
    <script>
        // =========== إعدادات العجلة ===========
        const SEGMENTS = [
            { color: '#FF6B6B', label: '0', value: 0 },
            { color: '#4ECDC4', label: '5', value: 5 },
            { color: '#45B7D1', label: '10', value: 10 },
            { color: '#96CEB4', label: '15', value: 15 },
            { color: '#FFE194', label: '25', value: 25 },
            { color: '#B8A9C9', label: '50', value: 50 },
            { color: '#FFD700', label: '80', value: 80 }
        ];
        
        // =========== بيانات المستخدم ===========
        let totalPoints = parseInt(localStorage.getItem('totalPoints') || '0');
        
        // =========== عناصر HTML ===========
        const totalPointsEl = document.getElementById('totalPoints');
        const wheelBalanceEl = document.getElementById('wheelBalance');
        const spinBtn = document.getElementById('spinBtn');
        const prizeMessage = document.getElementById('prizeMessage');
        const prizeValue = document.getElementById('prizeValue');
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        
        // =========== متغيرات العجلة ===========
        let isSpinning = false;
        let currentRotation = 0;
        
        // =========== تحديث الرصيد ===========
        function updateUI() {
            totalPointsEl.textContent = totalPoints;
            wheelBalanceEl.textContent = totalPoints;
            localStorage.setItem('totalPoints', totalPoints.toString());
        }
        updateUI();
        
        // =========== رسم العجلة ===========
        function drawWheel() {
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            ctx.clearRect(0, 0, 280, 280);
            
            SEGMENTS.forEach((seg, index) => {
                const startAngle = index * angleStep;
                const endAngle = startAngle + angleStep;
                
                // رسم القطاع
                ctx.beginPath();
                ctx.fillStyle = seg.color;
                ctx.moveTo(140, 140);
                ctx.arc(140, 140, 140, startAngle, endAngle);
                ctx.closePath();
                ctx.fill();
                
                // رسم الخطوط البيضاء
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(140, 140);
                ctx.lineTo(140 + Math.cos(startAngle) * 140, 140 + Math.sin(startAngle) * 140);
                ctx.stroke();
                
                // كتابة القيمة
                ctx.save();
                ctx.translate(140, 140);
                ctx.rotate(startAngle + angleStep / 2);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#000';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(seg.label, 80, 0);
                ctx.restore();
            });
        }
        drawWheel();
        
        // =========== رسم شبكة الجوائز ===========
        const prizeGrid = document.getElementById('prizeGrid');
        SEGMENTS.forEach(seg => {
            const item = document.createElement('span');
            item.className = 'prize-item';
            item.style.backgroundColor = seg.color;
            item.textContent = seg.label + ' نقطة';
            prizeGrid.appendChild(item);
        });
        
        // =========== الحصول على الجائزة بدقة 100% ===========
        function getPrize() {
            // حساب الزاوية النهائية وتطبيعها بين 0 و 360
            const finalAngle = ((currentRotation % 360) + 360) % 360;
            
            // زاوية المؤشر هي الزاوية الحالية + 90 درجة (لأن المؤشر في الأعلى)
            const pointerAngle = (finalAngle + 90) % 360;
            
            // حجم القطاع الواحد
            const segmentAngle = 360 / SEGMENTS.length;
            
            // حساب رقم القطاع (من 0 إلى 6)
            const index = Math.floor(pointerAngle / segmentAngle) % SEGMENTS.length;
            
            console.log(`الزاوية: ${finalAngle.toFixed(2)}°, المؤشر: ${pointerAngle.toFixed(2)}°, القطاع: ${index}, القيمة: ${SEGMENTS[index].value}`);
            
            return SEGMENTS[index];
        }
        
        // =========== تدوير العجلة ===========
        function spinWheel() {
            if (isSpinning) return;
            
            if (totalPoints < 20) {
                alert('❌ رصيدك غير كافٍ! تحتاج 20 نقطة للعب');
                return;
            }
            
            // خصم النقاط
            totalPoints -= 20;
            updateUI();
            
            isSpinning = true;
            spinBtn.disabled = true;
            prizeMessage.classList.add('hidden');
            
            // إضافة دوران عشوائي (5 إلى 8 لفات)
            const randomSpins = Math.floor(Math.random() * 4) + 5; // 5-8 لفات
            const spinAngle = randomSpins * 360 + Math.random() * 360;
            currentRotation += spinAngle;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            // بعد انتهاء الدوران
            setTimeout(() => {
                const prize = getPrize();
                
                totalPoints += prize.value;
                updateUI();
                
                prizeValue.textContent = prize.value;
                prizeMessage.classList.remove('hidden');
                
                setTimeout(() => {
                    isSpinning = false;
                    spinBtn.disabled = false;
                }, 2000);
                
            }, 4000);
        }
    </script>
</body>
</html>
