<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاهدة إعلانات - ربح النقاط</title>
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(145deg, #0f0c29, #302b63, #24243e); min-height: 100vh; color: white; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 400px; width: 90%; padding: 20px; text-align: center; }
        h1 { color: #ffd700; margin-bottom: 30px; }
        .balance { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .points { font-size: 48px; color: #ffd700; font-weight: bold; }
        .btn { background: linear-gradient(135deg, #ffd700, #ffa500); border: none; color: #333; padding: 15px 30px; font-size: 20px; border-radius: 50px; cursor: pointer; width: 100%; font-weight: bold; margin: 10px 0; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .timer { font-size: 24px; margin: 20px 0; color: #ffd700; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 ربح من الإعلانات</h1>
        
        <div class="balance">
            <div>نقاطك الحالية</div>
            <div class="points" id="points">0</div>
        </div>

        <div id="adSection">
            <button class="btn" id="adBtn" onclick="playAd()">🎬 مشاهدة إعلان (30 ثانية)</button>
            <div class="timer" id="timer">30</div>
            <div id="message"></div>
        </div>

        <button class="btn hidden" id="claimBtn" onclick="claimPoints()">💰 استلم نقطتك</button>
    </div>

    <script>
        // بيانات المستخدم (مؤقتة)
        let userPoints = parseInt(localStorage.getItem('points') || '0');
        let dailyAds = parseInt(localStorage.getItem('dailyAds') || '0');
        let lastAdDate = localStorage.getItem('lastAdDate') || '';
        
        // إعلانات OnClicka
        let videoShow = null;
        let countdown = null;
        let timeLeft = 30;
        let adWatched = false;

        // تحديث العرض
        document.getElementById('points').innerText = userPoints;

        // تهيئة الإعلان
        window.initCdTma?.({ id: '6113667' }).then(show => {
            videoShow = show;
            console.log('✅ إعلان جاهز');
        }).catch(e => console.log('❌ خطأ في الإعلان:', e));

        // تشغيل الإعلان
        function playAd() {
            if (!videoShow) {
                document.getElementById('message').innerText = '⚠️ الإعلان لم يتم تحميله بعد';
                return;
            }

            if (dailyAds >= 400) {
                document.getElementById('message').innerText = '❌ لقد استنفدت الحد اليومي';
                return;
            }

            document.getElementById('adBtn').disabled = true;
            document.getElementById('message').innerText = '📺 يتم تشغيل الإعلان...';

            videoShow().then(() => {
                startCountdown();
            }).catch(e => {
                console.log(e);
                document.getElementById('message').innerText = '❌ حدث خطأ';
                document.getElementById('adBtn').disabled = false;
            });
        }

        // العد التنازلي
        function startCountdown() {
            timeLeft = 30;
            document.getElementById('timer').innerText = timeLeft;
            
            countdown = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    document.getElementById('adBtn').disabled = false;
                    document.getElementById('message').innerText = '✅ تمت المشاهدة! اضغط استلام';
                    document.getElementById('claimBtn').classList.remove('hidden');
                    adWatched = true;
                }
            }, 1000);
        }

        // استلام النقاط
        function claimPoints() {
            if (!adWatched) return;
            
            userPoints++;
            dailyAds++;
            localStorage.setItem('points', userPoints);
            localStorage.setItem('dailyAds', dailyAds);
            localStorage.setItem('lastAdDate', new Date().toDateString());
            
            document.getElementById('points').innerText = userPoints;
            document.getElementById('claimBtn').classList.add('hidden');
            document.getElementById('message').innerText = '🎁 تمت إضافة نقطة';
            
            adWatched = false;
        }

        // التحقق من التاريخ اليومي
        function checkDaily() {
            const today = new Date().toDateString();
            if (lastAdDate !== today) {
                dailyAds = 0;
                localStorage.setItem('dailyAds', '0');
            }
        }
        checkDaily();
    </script>
</body>
</html>
