<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>body{font-family:Arial;text-align:center;padding:40px;background:linear-gradient(45deg,#667eea,#764ba2);color:white;}
    button{background:#0088cc;color:white;border:none;padding:20px 40px;font-size:18px;border-radius:25px;margin:10px;cursor:pointer;}
    button:hover{background:#0066cc;}
    .points{font-size:28px;margin:30px;color:#00ff88;}</style>
</head>
<body>
    <h1>🚀 Earn Bot Pro</h1>
    <div class="points">النقاط: <span id="points">0</span></div>
    
    <button onclick="watchAd()">📺 إعلان +5</button>
    <button onclick="spinWheel()">🎰 عجلة الحظ</button>
    <button onclick="dailyCheckin()">✅ يومي +15</button>
    <button onclick="referFriends()">👥 أصدقاء +50</button>
    
    <script>
    const tg=window.Telegram.WebApp;tg.expand();
    let points=0;
    
    function sendData(action){tg.sendData(action);}
    
    function watchAd(){
        sendData('watch_ad');points+=5;updatePoints();
        tg.showAlert('✅ إعلان تم! +5 نقطة');
    }
    
    function spinWheel(){
        const rewards=[5,10,15,25,50];
        const r=rewards[Math.floor(Math.random()*rewards.length)];
        sendData('wheel_'+r);points+=r;updatePoints();
        tg.showAlert('🎉 فزت بـ '+r+' نقطة!');
    }
    
    function dailyCheckin(){
        sendData('checkin');points+=15;updatePoints();
        tg.showAlert('✅ تسجيل يومي! +15 نقطة');
    }
    
    function referFriends(){
        sendData('refer');points+=50;updatePoints();
        tg.showAlert('👥 تم المشاركة! +50 نقطة');
    }
    
    function updatePoints(){document.getElementById('points').innerText=points;}
    </script>
</body>
</html>
