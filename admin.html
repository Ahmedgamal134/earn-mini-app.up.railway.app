<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المشرفين - بوت الربح</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            color: #ffd700;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #ffd700;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }

        .tab-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: #ffd700;
        }

        .tab-btn.active {
            background: #ffd700;
            color: #333;
            border-color: #ffd700;
        }

        .search-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px;
            width: 100%;
            outline: none;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-box button {
            background: #ffd700;
            border: none;
            color: #333;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            padding: 15px;
            text-align: right;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.admin {
            background: #ffd700;
            color: #333;
        }

        .badge.user {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .badge.vip {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #333;
        }

        .badge.banned {
            background: #f44336;
            color: white;
        }

        .action-btns {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .action-btn.edit {
            background: #2196F3;
            color: white;
        }

        .action-btn.ban {
            background: #f44336;
            color: white;
        }

        .action-btn.unban {
            background: #4CAF50;
            color: white;
        }

        .action-btn.add-points {
            background: #ffd700;
            color: #333;
        }

        .action-btn.view {
            background: #9C27B0;
            color: white;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #ffd700;
        }

        .modal-content h2 {
            color: #ffd700;
            margin-bottom: 20px;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .page-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .page-btn:hover, .page-btn.active {
            background: #ffd700;
            color: #333;
            border-color: #ffd700;
        }

        .quick-actions {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .quick-action-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            min-width: 150px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ لوحة تحكم المشرفين</h1>
            <p>مرحباً بك في نظام إدارة المستخدمين</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalUsers">0</div>
                    <div class="stat-label">إجمالي المستخدمين</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="activeToday">0</div>
                    <div class="stat-label">نشط اليوم</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalPoints">0</div>
                    <div class="stat-label">إجمالي النقاط</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="pendingWithdrawals">0</div>
                    <div class="stat-label">طلبات سحب</div>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('users')">👥 المستخدمين</button>
            <button class="tab-btn" onclick="switchTab('withdrawals')">💳 طلبات السحب</button>
            <button class="tab-btn" onclick="switchTab('stats')">📊 إحصائيات</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 بحث باسم المستخدم أو ID" onkeyup="searchUsers()">
            <button onclick="searchUsers()">بحث</button>
        </div>

        <!-- تبويب المستخدمين -->
        <div id="usersTab" class="tab-content active">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>المستخدم</th>
                            <th>ID</th>
                            <th>النقاط</th>
                            <th>الحالة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
            <div class="pagination" id="usersPagination"></div>
        </div>

        <!-- تبويب طلبات السحب -->
        <div id="withdrawalsTab" class="tab-content">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>المستخدم</th>
                            <th>المبلغ</th>
                            <th>المحفظة</th>
                            <th>التاريخ</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="withdrawalsTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- تبويب الإحصائيات -->
        <div id="statsTab" class="tab-content">
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>📈 نمو المستخدمين</h3>
                    <canvas id="userGrowthChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>💰 توزيع النقاط</h3>
                    <canvas id="pointsDistributionChart"></canvas>
                </div>
            </div>
            
            <div class="table-container" style="margin-top: 20px;">
                <h3>🏆 أفضل 10 مستخدمين</h3>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المستخدم</th>
                            <th>النقاط</th>
                        </tr>
                    </thead>
                    <tbody id="topUsersBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- مودال تعديل المستخدم -->
    <div class="modal" id="userModal">
        <div class="modal-content">
            <h2 id="modalTitle">تعديل مستخدم</h2>
            <input type="hidden" id="modalUserId">
            <input type="text" id="modalUsername" placeholder="اسم المستخدم">
            <input type="number" id="modalPoints" placeholder="النقاط">
            <select id="modalStatus">
                <option value="active">نشط</option>
                <option value="banned">محظور</option>
                <option value="vip">VIP</option>
            </select>
            <div class="modal-buttons">
                <button class="quick-action-btn" onclick="saveUser()">💾 حفظ</button>
                <button class="quick-action-btn" style="background: #f44336;" onclick="closeModal()">❌ إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        // بيانات تجريبية
        let users = [];
        let withdrawals = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        // تهيئة البيانات
        function initData() {
            for (let i = 1; i <= 30; i++) {
                users.push({
                    id: 1000000 + i,
                    first_name: `مستخدم ${i}`,
                    points: Math.floor(Math.random() * 5000),
                    status: Math.random() > 0.8 ? 'banned' : 'active'
                });
            }
            
            for (let i = 1; i <= 5; i++) {
                withdrawals.push({
                    id: i,
                    user_name: `مستخدم ${i}`,
                    amount: (Math.random() * 500).toFixed(2),
                    wallet: 'فودافون كاش',
                    date: new Date().toLocaleDateString('ar-EG')
                });
            }
            
            updateStats();
            displayUsers();
            displayWithdrawals();
            displayTopUsers();
            initCharts();
        }

        function updateStats() {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('activeToday').textContent = Math.floor(users.length * 0.3);
            document.getElementById('totalPoints').textContent = users.reduce((sum, u) => sum + u.points, 0);
            document.getElementById('pendingWithdrawals').textContent = withdrawals.length;
        }

        function displayUsers() {
            const tbody = document.getElementById('usersTableBody');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const filteredUsers = filterUsers();
            const pageUsers = filteredUsers.slice(start, end);
            
            tbody.innerHTML = '';
            pageUsers.forEach(user => {
                tbody.innerHTML += `
                    <tr>
                        <td>${user.first_name}</td>
                        <td><code>${user.id}</code></td>
                        <td><strong>${user.points}</strong></td>
                        <td><span class="badge ${user.status === 'banned' ? 'banned' : 'user'}">${user.status === 'banned' ? 'محظور' : 'نشط'}</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="action-btn view" onclick="viewUser(${user.id})">👁️</button>
                                <button class="action-btn edit" onclick="editUser(${user.id})">✏️</button>
                                <button class="action-btn add-points" onclick="addPoints(${user.id})">➕</button>
                                ${user.status === 'banned' ? 
                                    `<button class="action-btn unban" onclick="unbanUser(${user.id})">✅</button>` :
                                    `<button class="action-btn ban" onclick="banUser(${user.id})">🚫</button>`
                                }
                            </div>
                        </td>
                    </tr>
                `;
            });

            const totalPages = Math.ceil(filteredUsers.length / itemsPerPage);
            const pagination = document.getElementById('usersPagination');
            pagination.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                pagination.innerHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
        }

        function displayWithdrawals() {
            const tbody = document.getElementById('withdrawalsTableBody');
            tbody.innerHTML = '';
            withdrawals.forEach(w => {
                tbody.innerHTML += `
                    <tr>
                        <td>${w.user_name}</td>
                        <td><strong>${w.amount} جنيه</strong></td>
                        <td>${w.wallet}</td>
                        <td>${w.date}</td>
                        <td>
                            <div class="action-btns">
                                <button class="action-btn unban" onclick="approveWithdraw(${w.id})">✅ قبول</button>
                                <button class="action-btn ban" onclick="rejectWithdraw(${w.id})">❌ رفض</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        function displayTopUsers() {
            const tbody = document.getElementById('topUsersBody');
            const topUsers = [...users].sort((a, b) => b.points - a.points).slice(0, 10);
            
            tbody.innerHTML = '';
            topUsers.forEach((user, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>#${index + 1}</td>
                        <td>${user.first_name}</td>
                        <td>${user.points}</td>
                    </tr>
                `;
            });
        }

        function filterUsers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            return users.filter(user => 
                user.first_name.toLowerCase().includes(searchTerm) ||
                user.id.toString().includes(searchTerm)
            );
        }

        function searchUsers() {
            currentPage = 1;
            displayUsers();
        }

        function goToPage(page) {
            currentPage = page;
            displayUsers();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        function viewUser(id) {
            const user = users.find(u => u.id === id);
            Swal.fire({
                title: user.first_name,
                html: `ID: ${user.id}<br>النقاط: ${user.points}`,
                icon: 'info'
            });
        }

        function editUser(id) {
            const user = users.find(u => u.id === id);
            document.getElementById('modalUserId').value = user.id;
            document.getElementById('modalUsername').value = user.first_name;
            document.getElementById('modalPoints').value = user.points;
            document.getElementById('modalStatus').value = user.status;
            document.getElementById('userModal').classList.add('active');
        }

        function saveUser() {
            const id = parseInt(document.getElementById('modalUserId').value);
            const user = users.find(u => u.id === id);
            if (user) {
                user.first_name = document.getElementById('modalUsername').value;
                user.points = parseInt(document.getElementById('modalPoints').value);
                user.status = document.getElementById('modalStatus').value;
                Swal.fire('تم', 'تم حفظ التعديلات', 'success');
                closeModal();
                displayUsers();
                updateStats();
            }
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        function addPoints(id) {
            Swal.fire({
                title: 'إضافة نقاط',
                input: 'number',
                showCancelButton: true,
                confirmButtonText: 'إضافة'
            }).then(result => {
                if (result.isConfirmed) {
                    const user = users.find(u => u.id === id);
                    user.points += parseInt(result.value);
                    displayUsers();
                    updateStats();
                    Swal.fire('تم', `تم إضافة ${result.value} نقطة`, 'success');
                }
            });
        }

        function banUser(id) {
            const user = users.find(u => u.id === id);
            user.status = 'banned';
            displayUsers();
            Swal.fire('تم', 'تم حظر المستخدم', 'success');
        }

        function unbanUser(id) {
            const user = users.find(u => u.id === id);
            user.status = 'active';
            displayUsers();
            Swal.fire('تم', 'تم إلغاء حظر المستخدم', 'success');
        }

        function approveWithdraw(id) {
            Swal.fire('تم', 'تم قبول طلب السحب', 'success');
        }

        function rejectWithdraw(id) {
            Swal.fire('تم', 'تم رفض طلب السحب', 'success');
        }

        function initCharts() {
            new Chart(document.getElementById('userGrowthChart'), {
                type: 'line',
                data: {
                    labels: ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو'],
                    datasets: [{
                        label: 'عدد المستخدمين',
                        data: [65, 89, 120, 156, 198, users.length],
                        borderColor: '#ffd700',
                        backgroundColor: 'rgba(255, 215, 0, 0.1)'
                    }]
                }
            });

            new Chart(document.getElementById('pointsDistributionChart'), {
                type: 'doughnut',
                data: {
                    labels: ['0-100', '100-500', '500-1000', '1000+'],
                    datasets: [{
                        data: [
                            users.filter(u => u.points < 100).length,
                            users.filter(u => u.points >= 100 && u.points < 500).length,
                            users.filter(u => u.points >= 500 && u.points < 1000).length,
                            users.filter(u => u.points >= 1000).length
                        ],
                        backgroundColor: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4']
                    }]
                }
            });
        }

        initData();
    </script>
</body>
              </html>
