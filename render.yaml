services:
  - type: web
    name: earn-mini-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: SESSION_SECRET
        sync: false
